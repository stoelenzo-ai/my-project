<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #4ecca3;
      letter-spacing: 4px;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    #scoreboard span { color: #aaa; }
    #scoreboard strong { color: #4ecca3; font-size: 1.2rem; }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    #overlay h2 { font-size: 1.8rem; color: #4ecca3; margin-bottom: 8px; }
    #overlay p  { color: #ccc; margin-bottom: 20px; font-size: 0.95rem; }

    button {
      padding: 10px 32px;
      font-size: 1rem;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background: #38b28d; }

    #controls {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<h1>贪吃蛇</h1>

<div id="scoreboard">
  <div><span>得分 </span><strong id="score">0</strong></div>
  <div><span>最高分 </span><strong id="best">0</strong></div>
  <div><span>等级 </span><strong id="level">1</strong></div>
</div>

<div id="canvas-wrapper">
  <canvas id="game" width="400" height="400"></canvas>

  <div id="overlay">
    <h2 id="overlay-title">贪吃蛇</h2>
    <p id="overlay-msg">用方向键或 WASD 控制蛇的移动</p>
    <button id="btn">开始游戏</button>
  </div>
</div>

<div id="controls">
  方向键 / WASD 移动 &nbsp;|&nbsp; P 暂停 &nbsp;|&nbsp; 吃到食物加速
</div>

<script>
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const btn     = document.getElementById('btn');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const titleEl = document.getElementById('overlay-title');
  const msgEl   = document.getElementById('overlay-msg');

  const COLS = 20, ROWS = 20;
  const CELL = canvas.width / COLS;

  let snake, dir, nextDir, food, score, best = 0, level, speed, loop, paused, running;

  function init() {
    snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    level   = 1;
    speed   = 150;
    paused  = false;
    running = true;
    placeFood();
    updateHUD();
    overlay.style.display = 'none';
    clearInterval(loop);
    loop = setInterval(tick, speed);
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function tick() {
    if (paused || !running) return;
    dir = nextDir;

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 穿墙
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;

    // 撞自身
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver(); return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      if (score > best) best = score;
      if (score % 50 === 0) {
        level++;
        speed = Math.max(60, speed - 15);
        clearInterval(loop);
        loop = setInterval(tick, speed);
      }
      placeFood();
      updateHUD();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0f0f1e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(canvas.width, j * CELL); ctx.stroke();
    }

    // Food
    const fx = food.x * CELL, fy = food.y * CELL;
    ctx.fillStyle = '#ff6b6b';
    ctx.shadowColor = '#ff6b6b';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(fx + CELL / 2, fy + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const t = 1 - i / snake.length;
      ctx.fillStyle = i === 0
        ? '#4ecca3'
        : `rgba(78, ${Math.round(140 + t * 62)}, ${Math.round(100 + t * 63)}, ${0.5 + t * 0.5})`;
      ctx.shadowColor = i === 0 ? '#4ecca3' : 'transparent';
      ctx.shadowBlur  = i === 0 ? 10 : 0;
      const pad = i === 0 ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 3);
      ctx.fill();
    });
    ctx.shadowBlur = 0;

    // Eyes on head
    const hx = snake[0].x * CELL, hy = snake[0].y * CELL;
    ctx.fillStyle = '#1a1a2e';
    const eye1 = eyePos(dir, hx, hy, -1);
    const eye2 = eyePos(dir, hx, hy,  1);
    ctx.beginPath(); ctx.arc(eye1.x, eye1.y, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(eye2.x, eye2.y, 2, 0, Math.PI * 2); ctx.fill();
  }

  function eyePos(d, hx, hy, side) {
    const cx = hx + CELL / 2, cy = hy + CELL / 2;
    const offset = 4;
    if (d.x === 1)  return { x: cx + 4, y: cy + side * offset };
    if (d.x === -1) return { x: cx - 4, y: cy + side * offset };
    if (d.y === 1)  return { x: cx + side * offset, y: cy + 4 };
    return                  { x: cx + side * offset, y: cy - 4 };
  }

  function updateHUD() {
    scoreEl.textContent = score;
    bestEl.textContent  = best;
    levelEl.textContent = level;
  }

  function gameOver() {
    running = false;
    clearInterval(loop);
    titleEl.textContent = '游戏结束';
    msgEl.textContent   = `得分：${score}　最高分：${best}`;
    btn.textContent     = '再来一局';
    overlay.style.display = 'flex';
  }

  btn.addEventListener('click', init);

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp:    { x:  0, y: -1 }, w: { x:  0, y: -1 }, W: { x:  0, y: -1 },
      ArrowDown:  { x:  0, y:  1 }, s: { x:  0, y:  1 }, S: { x:  0, y:  1 },
      ArrowLeft:  { x: -1, y:  0 }, a: { x: -1, y:  0 }, A: { x: -1, y:  0 },
      ArrowRight: { x:  1, y:  0 }, d: { x:  1, y:  0 }, D: { x:  1, y:  0 },
    };
    if (map[e.key]) {
      e.preventDefault();
      const nd = map[e.key];
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    }
    if (e.key === 'p' || e.key === 'P') {
      if (!running) return;
      paused = !paused;
      if (paused) {
        titleEl.textContent = '已暂停';
        msgEl.textContent   = '按 P 继续';
        btn.style.display   = 'none';
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = 'none';
        btn.style.display = '';
      }
    }
  });
</script>
</body>
</html>
